{{- define "main" }}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&display=swap');

  .scholarship-content {
    max-width: 1072px;
    margin: 0 auto;
    padding: 0 1.5rem;
    font-family: 'Lato', sans-serif;
  }

  .scholarship-content h1 {
    font-size: 3rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .scholarship-content h2,
  .scholarship-content h3 {
    font-size: 1.5rem;
    margin-top: 2rem;
    margin-bottom: 2rem;
  }

  .scholarship-content p,
  .scholarship-content li {
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 1.5rem;
  }

  .scholarship-content a {
    color: #25C722;
    text-decoration: none;
    font-family: 'Lato', sans-serif;
  }

  .scholarship-content a:hover {
    text-decoration: underline;
  }

  /* ── Responsive: Tablet (481–768px) ── */
  @media (max-width: 768px) {
    .scholarship-content {
      padding: 0 1rem;
    }

    .scholarship-content h1 {
      font-size: 2rem;
    }

    .scholarship-content h2,
    .scholarship-content h3 {
      font-size: 1.2rem;
      margin-top: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .scholarship-content p,
    .scholarship-content li {
      font-size: 0.95rem;
    }
  }

  /* ── Responsive: Mobile (≤ 480px) ── */
  @media (max-width: 480px) {
    .scholarship-content {
      padding: 0 0.75rem;
    }

    .scholarship-content h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .scholarship-content h2,
    .scholarship-content h3 {
      font-size: 1.1rem;
      margin-top: 1.25rem;
      margin-bottom: 1rem;
    }

    .scholarship-content p,
    .scholarship-content li {
      font-size: 0.9rem;
      line-height: 1.5;
      margin-bottom: 1rem;
    }
  }
</style>

<div class="scholarship-content">
  {{ .Content }}
</div>
{{- end }}
