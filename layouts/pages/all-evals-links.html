{{- define "main" }}
<style>
  .main {
    display: flex;
    justify-content: center;
    padding: 4rem 2rem 2rem;
  }
  
  /* ── buttons ── */
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 1.75rem;
    margin-top: 1.25rem;
    text-align: center;
    align-items: center;
  }

  .buttons a {
    display: inline-block;
    padding: 1rem 1.1rem;
    border-radius: 999px;
    font-size: 1.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-decoration: none;
    background-color: #25C722;
    color: #000 !important;
    border: 1.5px solid #25C722;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
    box-sizing: border-box;
  }

  .buttons a:hover {
    background-color: #fff;
    border-color: #fff;
    color: #000 !important;
    filter: brightness(0.6);
  }

  /* Tablet (481–768px): slightly smaller font */
  @media (max-width: 768px) {
    .main {
      padding: 3rem 1.5rem 1.5rem;
    }
    .buttons a {
      font-size: 1.25rem;
      padding: 0.9rem 1rem;
      white-space: nowrap;
    }
  }

  /* Mobile (≤ 480px): smaller buttons with adjusted sizing */
  @media (max-width: 480px) {
    .main {
      padding: 2rem 1rem 1rem;
    }
    .buttons {
      gap: 1rem;
      margin-top: 0.75rem;
    }
    .buttons a {
      font-size: 0.85rem;
      padding: 0.65rem 0.7rem;
      white-space: normal;
    }
  }
</style>

<div class="buttons">
      <a href="https://lucas-avelar.com/teaching-evals/fall-2024/" target = "_blank" style="background: linear-gradient(to right, #56ab2f, #a8e063); color: #000 !important; border: none;">HIST 1010 - Fall 2024 Course Evaluations</a>
      <a href="https://lucas-avelar.com/teaching-evals/spring-2025/" target="_blank" style="background: linear-gradient(to right, #f093fb, #667eea); color: #000 !important; border: none;">HIST 1010 - Spring 2025 Course Evaluations</a>
      <a href="https://lucas-avelar.com/teaching-evals/fall-2025/" target = "-blank" style="background: linear-gradient(to right, #d4e09b, #a8d8ea); color: #000 !important; border: none;">HIST 1010 - Fall 2025 Course Evaluations</a>
</div>
{{- end }}
