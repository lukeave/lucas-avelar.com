{{- /* Head custom content area - site override */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&display=swap');

  * {
    box-sizing: border-box;
  }

  body {
    overflow-x: hidden;
  }

  :root {
    font-family: 'Lato', ui-sans-serif, system-ui, sans-serif !important;
  }

  body, p, li, td, th, input, textarea, select, button, .post-content, .entry-content {
    font-family: "Aptos", "Source Sans 3", "Segoe UI", ui-sans-serif, system-ui, sans-serif !important;
    letter-spacing: 0.01em;
  }

  /* Navigation: larger */
  #nav a, .nav a, header nav a, .header nav a {
    font-size: 1.5rem !important;
    font-family: "Aptos", "Source Sans 3", "Segoe UI", ui-sans-serif, system-ui, sans-serif !important;
    font-weight: 500;
  }

  .logo a, header .logo {
    font-family: "Aptos", "Source Sans 3", "Segoe UI", ui-sans-serif, system-ui, sans-serif !important;
  }

  /* Mobile: shrink nav font */
  @media (max-width: 768px) {
    #nav a, .nav a, header nav a, .header nav a {
      font-size: 1rem !important;
    }
  }
  
  /* Hide logo only on home page (where "About" is the first menu item with active class) */
  #menu li:first-child a span.active {
    position: relative;
  }
  
  body:has(#menu li:first-child a span.active) .logo a {
    display: none;
  }

/* ──────────────────────────────────────────────────────────────────
   Unified Layout & Responsive Rules (applies site-wide)
   ────────────────────────────────────────────────────────────────── */

  /* Allow content to expand; individual pages set their own max-width */
  .page-header,
  .post-single,
  .post-content,
  main.main {
    max-width: none;
    padding: 0;
  }
  
  /* Add top padding consistently across all pages */
  main.main {
    padding-top: 3rem !important;
  }

  /* ── Profile Grid (home page and similar layouts) ── */
  .profile-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 2.5rem;
    max-width: 1200px;
    width: 100%;
    margin: 4rem auto;
    padding: 0 2.5rem;
  }

  .profile-grid .cell {
    display: flex;
    flex-direction: column;
  }

  /* ── Profile photo ── */
  .cell-photo .photo-circle {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background-image: url('/wp-content/uploads/2023/03/Clemson-headshot.jpeg');
    background-size: 120%;
    background-repeat: no-repeat;
    background-position: center 40%;
    background-color: #222222;
    display: block;
    border: 3px solid #2f2f2f;
  }

  .cell-photo img {
    display: none;
  }

  /* ── Profile buttons ── */
  .profile-buttons {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }

  .profile-buttons a {
    display: inline-block;
    padding: 0.45rem 1.1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-decoration: none;
    background-color: #25C722;
    color: #000 !important;
    border: 1.5px solid #25C722;
    transition: background 0.2s, color 0.2s;
  }

  .profile-buttons a:hover {
    background-color: #fff;
    border-color: #fff;
    color: #000 !important;
    filter: brightness(0.6);
  }

  /* ── Body text cells ── */
  .cell-intro {
    font-size: 1rem;
    line-height: 1.75;
    color: #999;
    justify-content: center;
  }
  
  .cell-research,
  .cell-more {
    font-size: 1rem;
    line-height: 1.75;
    color: #999; 
    justify-content: flex-start;   
  }

  /* Links inside cells — matches WP "Page Post Content Link Color" */
  .cell-intro a,
  .cell-research a,
  .cell-more a {
    color: #25c722 !important;
    text-decoration: none;
  }

  .cell-intro a:hover,
  .cell-research a:hover,
  .cell-more a:hover {
    color: #25c722 !important;
    text-decoration: underline;
  }

  /* ── Expandable "More on my background" ── */
  .cell-more details {
    border: 1px solid #2f2f2f;
    border-radius: 4px;
    padding: 0.5rem 1rem;
    margin-bottom: 0rem;
  }

  .cell-more details summary {
    cursor: pointer;
    font-weight: 600;
    color: #ffffff;
    margin-bottom: 0.5rem;
    list-style: none;
  }

  .cell-more details summary::before {
    content: "▶ ";
    font-size: 0.75rem;
    color: #25c722;
  }

  .cell-more details[open] summary::before {
    content: "▼ ";
    color: #25c722;
  }

  .cell-more details p {
    margin-bottom: 1rem;
    color: #999999;
  }

  /* ── Second photo ── */
  .cell-more .second-photo {
    margin-top: 1.5rem;
    border-radius: 12px;
    width: 100%;
    max-width: 100%;
    border: 1px solid #2f2f2f;
  }

  .cell-more .second-photo img {
    width: 100%;
    border-radius: 12px;
    display: block;
  }

  .second-photo figcaption {
    font-size: 0.8rem;
    color: #999999;
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* ── Headings inside grid ── */
  .profile-grid h1,
  .profile-grid h2,
  .profile-grid h3 {
    color: #ffffff;
  }

  /* ── Responsive: profile grid ── */
  @media (max-width: 768px) {
    .profile-grid {
      grid-template-columns: 1fr;
      padding: 0 1.5rem;
    }
    .cell-photo .photo-circle {
      width: 220px;
      height: 220px;
    }
  }
  
  @media (max-width: 480px) {
    .profile-grid {
      grid-template-columns: 1fr;
      padding: 0 1rem;
      gap: 1.5rem;
    }
    .profile-grid h1 {
      font-size: 1.8rem;
    }
  }

  /* ──────────────────────────────────────────────────────────────────
     Global Container & Content Rules
     ────────────────────────────────────────────────────────────────── */

  /* Standard content max-width for readable text */
  .post-content,
  .entry-content,
  .page-header,
  .contact-content {
    max-width: 1000px;
    margin-left: auto;
    margin-right: auto;
    padding-left: 1.5rem;
    padding-right: 1.5rem;
    box-sizing: border-box;
  }

  /* Ensure block-level content doesn't overflow on narrow screens */
  .post-content > *,
  .entry-content > * {
    min-width: 0;
  }

  /* Responsive images, videos, iframes */
  .post-content img,
  .entry-content img,
  figure img,
  img {
    max-width: 100%;
    height: auto;
    display: block;
  }

  .post-content iframe,
  .entry-content iframe,
  .post-content video,
  .entry-content video {
    max-width: 100%;
    height: auto;
  }

  /* Make tables scrollable on narrow screens */
  .post-content table,
  .entry-content table {
    width: 100%;
    display: block;
    overflow-x: auto;
  }

  /* ── Responsive: tablet (481–768px) ── */
  @media (max-width: 768px) {
    .post-content,
    .entry-content,
    .page-header,
    .contact-content {
      padding-left: 1rem;
      padding-right: 1rem;
    }
  }

  /* ── Responsive: mobile (≤ 480px) ── */
  @media (max-width: 480px) {
    .post-content,
    .entry-content,
    .page-header,
    .contact-content {
      padding-left: 0.75rem;
      padding-right: 0.75rem;
      font-size: 0.98rem;
      line-height: 1.6;
    }
  }

  /* On very wide screens, keep lines readable */
  @media (min-width: 1400px) {
    .post-content,
    .entry-content,
    .page-header,
    .contact-content {
      max-width: 1100px;
    }
  }

</style>
