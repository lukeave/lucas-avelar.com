{{- /* Head custom content area - site override */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400&display=swap');

  * {
    box-sizing: border-box;
  }

  body {
    overflow-x: hidden;
  }

  :root {
    font-family: 'Lato', ui-sans-serif, system-ui, sans-serif !important;
  }

  body, p, li, td, th, input, textarea, select, button, .post-content, .entry-content {
    font-family: "Aptos", "Source Sans 3", "Segoe UI", ui-sans-serif, system-ui, sans-serif !important;
    letter-spacing: 0.01em;
  }

  /* Navigation: larger */
  #nav a, .nav a, header nav a, .header nav a {
    font-size: 1.5rem !important;
    font-family: "Aptos", "Source Sans 3", "Segoe UI", ui-sans-serif, system-ui, sans-serif !important;
    font-weight: 500;
  }

  .logo a, header .logo {
    font-family: "Aptos", "Source Sans 3", "Segoe UI", ui-sans-serif, system-ui, sans-serif !important;
  }

  /* Space between nav and main content */
  main.main, .main {
    padding-top: 3rem !important;
  }

  /* Mobile: shrink nav font */
  @media (max-width: 768px) {
    #nav a, .nav a, header nav a, .header nav a {
      font-size: 1rem !important;
    }
  }
  
  body.list .logo a {
  display: none;
}
</style>
